<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Login - Online Voting System</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-panel">
        <a class="brand" href="index.html">
          <span class="brand-mark">OV</span>
          Nepal Online Voting
        </a>
        <h1>Voter login</h1>
        <p>Sign in with your registered Nepali mobile number to open your ballot and submit your vote.</p>
      </section>

      <section class="auth-card">
        <h2>Welcome back</h2>
        <p>Use the voter account verified by the backend service.</p>
        <div id="pageAlert" hidden></div>

        <form id="loginForm" class="form" novalidate>
          <div class="form-row">
            <label for="phone">Mobile Number</label>
            <input id="phone" name="phone" type="tel" inputmode="numeric" pattern="9[876][0-9]{8}" maxlength="10" placeholder="98XXXXXXXX" required>
          </div>

          <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" required>
          </div>

          <button class="btn btn-primary" type="submit">Login</button>
          <p>New voter? <a class="muted-link" href="register.html">Create an account</a></p>
          <p><a class="muted-link" href="admin-login.html">Admin login</a></p>
        </form>
      </section>
    </main>
    <script src="../js/scripts.js"></script>
  </body>
</html>
