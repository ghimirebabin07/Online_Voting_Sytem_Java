<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results - Online Voting System</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="app-shell" data-page="results">
      <nav class="topbar">
        <a class="brand" href="vote.html">
          <span class="brand-mark">OV</span>
          eVote Nepal
        </a>
        <ul class="nav-links">
          <li><a href="vote.html">Vote</a></li>
          <li><a href="result.html">Results</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="developers.html">Developers</a></li>
          <li><button type="button" data-theme-toggle>Theme</button></li>
          <li><button type="button" data-logout>Logout</button></li>
        </ul>
      </nav>

      <main class="page">
        <section class="section-title">
          <p class="eyebrow">Live Count</p>
          <h1>Election results</h1>
          <p>Results load from the backend result endpoint and display candidate totals with vote percentages.</p>
        </section>

        <div id="pageAlert" hidden></div>

        <section class="result-summary">
          <article class="stat-card">
            <span>Current Leader</span>
            <strong id="winnerName">Pending</strong>
            <p id="winnerParty">Results pending</p>
          </article>
          <article class="stat-card">
            <span>Total Votes</span>
            <strong id="totalVotes">0</strong>
          </article>
        </section>

        <section id="candidateResults"></section>
      </main>
    </div>
    <script src="../js/scripts.js"></script>
  </body>
</html>
