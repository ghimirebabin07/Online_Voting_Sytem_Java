<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Online Voting System</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="app-shell" data-page="profile">
      <nav class="topbar">
        <a class="brand" href="vote.html">
          <span class="brand-mark">OV</span>
          Voter Portal
        </a>
        <ul class="nav-links">
          <li><a href="vote.html">Vote</a></li>
          <li><a href="result.html">Results</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="developers.html">Developers</a></li>
          <li><button type="button" data-theme-toggle>Theme</button></li>
          <li><button type="button" data-logout>Logout</button></li>
        </ul>
      </nav>

      <main class="page">
        <section class="section-title">
          <p class="eyebrow">Account</p>
          <h1>Voter profile</h1>
          <p>Profile fields come from the authenticated backend account.</p>
        </section>

        <div id="pageAlert" hidden></div>

        <section class="panel profile-card">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 160'%3E%3Crect width='160' height='160' fill='%23e2e8f0'/%3E%3Ccircle cx='80' cy='62' r='30' fill='%2394a3b8'/%3E%3Cpath d='M30 140c8-30 28-46 50-46s42 16 50 46' fill='%2394a3b8'/%3E%3C/svg%3E" alt="Voter profile">
          <div>
            <h2 id="profileName">Voter</h2>
            <div class="profile-fields">
              <div>
                <span>Phone</span>
                <strong id="profilePhone">-</strong>
              </div>
              <div>
                <span>Email</span>
                <strong id="profileEmail">-</strong>
              </div>
              <div>
                <span>Voter ID</span>
                <strong id="profileVoterId">-</strong>
              </div>
              <div>
                <span>Voting Status</span>
                <strong id="profileStatus">Checking</strong>
              </div>
              <div>
                <span>Province</span>
                <strong id="profileProvince">-</strong>
              </div>
              <div>
                <span>District</span>
                <strong id="profileDistrict">-</strong>
              </div>
              <div>
                <span>Municipality</span>
                <strong id="profileMunicipality">-</strong>
              </div>
            </div>
            <div class="button-row" style="margin-top: 18px;">
              <a class="btn btn-primary" href="vote.html">Go to Ballot</a>
              <button class="btn btn-secondary" type="button" data-logout>Logout</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="../js/scripts.js"></script>
  </body>
</html>
