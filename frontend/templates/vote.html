<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Vote - Online Voting System</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="app-shell" data-page="vote">
      <nav class="topbar">
        <a class="brand" href="vote.html">
          <span class="brand-mark">OV</span>
          eVote Nepal
        </a>
        <ul class="nav-links">
          <li><a href="vote.html">Vote</a></li>
          <li><a href="result.html">Results</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="developers.html">Developers</a></li>
          <li><button type="button" data-theme-toggle>Theme</button></li>
          <li><button type="button" data-logout>Logout</button></li>
        </ul>
      </nav>

      <main class="page">
        <section class="section-title">
          <p class="eyebrow">Ballot</p>
          <h1>Cast your vote</h1>
          <p>Select your province, district, and municipality to view candidates registered for that local voting area.</p>
        </section>

        <div id="pageAlert" hidden></div>
        <section class="panel location-panel" aria-label="Voting location">
          <div class="form location-grid">
            <div class="form-row">
              <label for="voteProvince">Province</label>
              <select id="voteProvince" name="province" required>
                <option value="">Select province</option>
              </select>
            </div>
            <div class="form-row">
              <label for="voteDistrict">District</label>
              <select id="voteDistrict" name="district" required disabled>
                <option value="">Select district</option>
              </select>
            </div>
            <div class="form-row">
              <label for="voteMunicipality">Municipality</label>
              <select id="voteMunicipality" name="municipality" required disabled>
                <option value="">Select municipality</option>
              </select>
            </div>
          </div>
        </section>
        <section id="candidateContainer" class="candidate-list"></section>
      </main>
    </div>
    <script src="../js/scripts.js"></script>
  </body>
</html>
