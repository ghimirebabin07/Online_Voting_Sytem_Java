<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Online Voting System</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-panel">
        <a class="brand" href="index.html">
          <span class="brand-mark">OV</span>
          eVote Nepal
        </a>
        <h1>Admin portal</h1>
        <p>Manage candidates, monitor voter totals, and review election status through protected backend endpoints.</p>
      </section>

      <section class="auth-card">
        <h2>Admin login</h2>
        <p>Use an administrator account created in the database.</p>
        <div id="pageAlert" hidden></div>

        <form id="adminLoginForm" class="form" novalidate>
          <div class="form-row">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Mobile, email, or admin username" required>
          </div>

          <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter password" required>
          </div>

          <button class="btn btn-primary" type="submit">Login</button>
          <p><a class="muted-link" href="login.html">Back to voter login</a></p>
        </form>
      </section>
    </main>
    <script src="../js/scripts.js"></script>
  </body>
</html>
